name: Deploy Frontend & Backend to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # OIDC トークン取得に必要
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-1
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── OIDC による IAM ロール引き受け（アクセスキー不要）──
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── バックエンドのビルド & プッシュ ──────────────────────
      - name: Build and push backend image
        working-directory: ./Backend
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ steps.login-ecr.outputs.registry }}/soc-backend:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/soc-backend:latest \
            --push .

      # ── フロントエンドのビルド & プッシュ ────────────────────
      - name: Build and push frontend image
        working-directory: ./frontend
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ steps.login-ecr.outputs.registry }}/soc-frontend:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/soc-frontend:latest \
            --push .

      # ── バックエンド: タスク定義更新 & デプロイ ──────────────
      - name: Download backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_BACKEND_TASK_FAMILY }} \
            --query taskDefinition > /tmp/backend-task-def.json

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/backend-task-def.json
          container-name: soc-backend
          image: ${{ steps.login-ecr.outputs.registry }}/soc-backend:${{ env.IMAGE_TAG }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ secrets.ECS_BACKEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── フロントエンド: タスク定義更新 & デプロイ ────────────
      - name: Download frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_FRONTEND_TASK_FAMILY }} \
            --query taskDefinition > /tmp/frontend-task-def.json

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/frontend-task-def.json
          container-name: soc-frontend
          image: ${{ steps.login-ecr.outputs.registry }}/soc-frontend:${{ env.IMAGE_TAG }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ secrets.ECS_FRONTEND_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
